<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- "Ahşap Karyola" (bed_wood, orta kademe yatak) — chibi/pastel stilinde
       önden görünüm; bed_basic (yuvarlak koyu başlık) ile bed_canopy
       (cibinlikli) arasında, düz ahşap panelli açık meşe başlık ve
       yeşil-mavi nevresim ile ayırt edilir. -->
  <defs>
    <linearGradient id="bwd_frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a06c"/>
      <stop offset="100%" stop-color="#a8794a"/>
    </linearGradient>
    <linearGradient id="bwd_blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fcf9a"/>
      <stop offset="100%" stop-color="#5fae72"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="90" rx="42" ry="5" fill="#3a2a1c" opacity="0.14"/>
  <!-- başlık: düz panelli açık meşe -->
  <rect x="10" y="20" width="80" height="34" rx="6" fill="url(#bwd_frame)" stroke="#7a5a35" stroke-width="3"/>
  <rect x="18" y="27" width="22" height="20" rx="3" fill="#b8874f" stroke="#7a5a35" stroke-width="2"/>
  <rect x="60" y="27" width="22" height="20" rx="3" fill="#b8874f" stroke="#7a5a35" stroke-width="2"/>
  <!-- yatak gövdesi -->
  <rect x="8" y="50" width="84" height="30" rx="6" fill="#fdf6e3" stroke="#7a5a35" stroke-width="3"/>
  <rect x="14" y="44" width="30" height="18" rx="7" fill="#ffffff" stroke="#7a5a35" stroke-width="2.5"/>
  <path d="M 20 56 L 90 56 L 90 78 L 20 78 Z" fill="url(#bwd_blanket)" stroke="#7a5a35" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 20 64 H 90" stroke="#3f8a52" stroke-width="2" opacity="0.7"/>
  <!-- ayak ucu -->
  <rect x="10" y="78" width="80" height="10" rx="4" fill="url(#bwd_frame)" stroke="#7a5a35" stroke-width="3"/>
</svg>
