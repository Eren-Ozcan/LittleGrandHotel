  <rect x="0" y="55" width="480" height="2" fill="#8a6642"/>
  <path d="M 0 59 q 60 -2 120 0 t 120 0 t 120 0 t 120 0" fill="none" stroke="#f0d8ae" stroke-width="1.4" opacity="0.6"/>
