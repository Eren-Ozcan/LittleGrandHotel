<svg xmlns="http://www.w3.org/2000/svg" width="480" height="64" viewBox="0 0 480 64">
  <!-- lobi sahnesi: mermer duvar, resepsiyon bankosu, yeşil koltuklar,
       balıklı fanus, altın asansör, çiçekler (Hotel City resepsiyonu) -->
  <defs>
    <linearGradient id="lb_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8efe1"/>
      <stop offset="100%" stop-color="#ecdcc4"/>
    </linearGradient>
    <linearGradient id="lb_floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d3ab7c"/>
      <stop offset="100%" stop-color="#a87f52"/>
    </linearGradient>
    <linearGradient id="lb_wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07850"/>
      <stop offset="100%" stop-color="#7a5a38"/>
    </linearGradient>
    <linearGradient id="lb_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d488"/>
      <stop offset="100%" stop-color="#c9a44c"/>
    </linearGradient>
    <linearGradient id="lb_marble_col" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fdf8ee"/>
      <stop offset="100%" stop-color="#e7d9bd"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="480" height="58" fill="url(#lb_wall)"/>
  <path d="M 0 8 q 40 6 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0" fill="none" stroke="#e0cdb6" stroke-width="3" opacity="0.7"/>
