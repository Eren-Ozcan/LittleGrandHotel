<svg xmlns="http://www.w3.org/2000/svg" width="96" height="32" viewBox="0 0 96 32">
  <!-- Misafir odası zemin dokusu (Faz 4): BEYAZ çizilir, çalışma zamanında
       modulate ile PALETTE.floor_wood tonuna boyanır — parke derzleri gri
       tonlamayla görünür kalır. guest_wallpaper.svg ile aynı tintable
       yaklaşım, yatay şerit olarak tekrarlanabilir (offset_left/right ile
       tam genişlik). -->
  <rect width="96" height="32" fill="#ffffff"/>
  <g stroke="#d8d8d8" stroke-width="1">
    <line x1="0" y1="0" x2="96" y2="0"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <line x1="48" y1="0" x2="48" y2="32"/>
    <line x1="80" y1="0" x2="80" y2="32"/>
    <line x1="32" y1="16" x2="32" y2="32"/>
    <line x1="64" y1="16" x2="64" y2="32"/>
    <line x1="0" y1="16" x2="16" y2="16"/>
    <line x1="16" y1="16" x2="48" y2="16"/>
    <line x1="48" y1="16" x2="80" y2="16"/>
    <line x1="80" y1="16" x2="96" y2="16"/>
  </g>
</svg>
