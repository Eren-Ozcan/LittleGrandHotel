<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Boş misafir odasının temel döşemesi (referans mockup'taki gibi oda hiç
       "boş kutu" görünmesin): yatak + yastık + komodin + lamba + duvar tablosu.
       Nötr ahşap/krem tonlar — her duvar rengiyle uyumlu. -->
  <defs>
    <linearGradient id="gf_wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b08857"/>
      <stop offset="100%" stop-color="#8a6642"/>
    </linearGradient>
    <linearGradient id="gf_blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef9d80"/>
      <stop offset="100%" stop-color="#d97b5c"/>
    </linearGradient>
  </defs>
  <!-- duvar tablosu -->
  <rect x="36" y="12" width="26" height="20" rx="2" fill="#e8c46a" stroke="#a07118" stroke-width="2"/>
  <rect x="40" y="16" width="18" height="12" fill="#bfe3f2"/>
  <circle cx="45" cy="20" r="2.2" fill="#ffd873"/>
  <path d="M 40 26 L 46 21 L 50 24 L 54 20 L 58 24 L 58 28 L 40 28 Z" fill="#7bc17c"/>
  <!-- yatak (sağ) -->
  <ellipse cx="74" cy="88" rx="20" ry="2.4" fill="#3a2a1c" opacity="0.16"/>
  <rect x="56" y="42" width="6" height="42" rx="2.5" fill="url(#gf_wood)" stroke="#5a4632" stroke-width="2"/>
  <rect x="60" y="58" width="34" height="9" rx="4" fill="#fdf6e3" stroke="#5a4632" stroke-width="2"/>
  <rect x="62" y="50" width="14" height="10" rx="4" fill="#ffffff" stroke="#5a4632" stroke-width="2"/>
  <path d="M 60 66 L 94 66 L 94 82 L 60 82 Z" fill="url(#gf_blanket)" stroke="#5a4632" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 60 71 H 94" stroke="#b85f42" stroke-width="1.8"/>
  <rect x="60" y="82" width="5" height="6" fill="url(#gf_wood)" stroke="#5a4632" stroke-width="1.6"/>
  <rect x="89" y="82" width="5" height="6" fill="url(#gf_wood)" stroke="#5a4632" stroke-width="1.6"/>
  <!-- komodin + lamba (sol) -->
  <ellipse cx="22" cy="88" rx="14" ry="2.2" fill="#3a2a1c" opacity="0.14"/>
  <rect x="12" y="64" width="22" height="20" rx="2" fill="url(#gf_wood)" stroke="#5a4632" stroke-width="2"/>
  <path d="M 14 72 h 18" stroke="#5a4632" stroke-width="1.6"/>
  <circle cx="23" cy="76" r="1.8" fill="#5a4632"/>
  <rect x="20" y="52" width="5" height="12" fill="#8a6642" stroke="#5a4632" stroke-width="1.8"/>
  <path d="M 13 52 L 33 52 L 28 40 L 18 40 Z" fill="#ffd873" stroke="#5a4632" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="23" cy="54" rx="6.5" ry="2" fill="#fff3cf" opacity="0.9"/>
</svg>
