<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64">
  <!-- chibi adam: afro saç, güneş gözlüğü, yeşil gömlek (tam boy, kalın çizgi) -->
  <defs>
    <radialGradient id="gb_skin" cx="42%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e3b381"/>
      <stop offset="100%" stop-color="#c68a5b"/>
    </radialGradient>
    <linearGradient id="gb_shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cbf5f"/>
      <stop offset="100%" stop-color="#3a9640"/>
    </linearGradient>
    <linearGradient id="gb_pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a746a"/>
      <stop offset="100%" stop-color="#6b5850"/>
    </linearGradient>
    <radialGradient id="gb_hair" cx="42%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#40281a"/>
      <stop offset="100%" stop-color="#2b1a10"/>
    </radialGradient>
  </defs>
  <ellipse cx="24" cy="62" rx="13" ry="2.2" fill="#241608" opacity="0.2"/>
  <!-- kollar -->
  <path d="M 15.5 41 q -5 2 -6 10 l 0 4" fill="none" stroke="url(#gb_shirt)" stroke-width="5.4" stroke-linecap="round"/>
  <path d="M 32.5 41 q 5 2 6 10 l 0 4" fill="none" stroke="url(#gb_shirt)" stroke-width="5.4" stroke-linecap="round"/>
  <circle cx="9" cy="56" r="3" fill="#c68a5b" stroke="#2d2416" stroke-width="1.8"/>
  <circle cx="39" cy="56" r="3" fill="#c68a5b" stroke="#2d2416" stroke-width="1.8"/>
  <path d="M 15.5 41 q -5 2 -6 10 l 0 4" fill="none" stroke="#2d2416" stroke-width="2" stroke-linecap="round"/>
  <path d="M 32.5 41 q 5 2 6 10 l 0 4" fill="none" stroke="#2d2416" stroke-width="2" stroke-linecap="round"/>
  <!-- ayakkabılar -->
  <path d="M 14 57 h 8 v 5 q 0 2 -2 2 h -6 z" fill="#2d2416" stroke="#1a1208" stroke-width="1.8"/>
  <path d="M 26 57 h 8 v 5 q 0 2 -2 2 h -6 z" fill="#2d2416" stroke="#1a1208" stroke-width="1.8"/>
  <!-- pantolon -->
  <rect x="16.5" y="49" width="6" height="11" rx="2" fill="url(#gb_pants)" stroke="#2d2416" stroke-width="2"/>
  <rect x="25.5" y="49" width="6" height="11" rx="2" fill="url(#gb_pants)" stroke="#2d2416" stroke-width="2"/>
  <!-- gömlek -->
  <path d="M 16 39 L 32 39 L 34 56 Q 24 59 14 56 Z" fill="url(#gb_shirt)" stroke="#2d2416" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M 24 39 L 24 54 M 21 43 h 6" fill="none" stroke="#2c7a32" stroke-width="1.6"/>
  <path d="M 20 39 Q 24 42.5 28 39" fill="none" stroke="#2d2416" stroke-width="1.6"/>
  <!-- baş + afro -->
  <circle cx="24" cy="24" r="16" fill="url(#gb_skin)" stroke="#2d2416" stroke-width="2.3"/>
  <path d="M 6.5 24 C 3 4 45 4 41.5 24 C 41.5 30 38 34 34 35 C 37 27 35 15 24 15 C 13 15 11 27 14 35 C 10 34 6.5 30 6.5 24 Z" fill="url(#gb_hair)" stroke="#1a0f08" stroke-width="2.3" stroke-linejoin="round"/>
  <circle cx="16" cy="10" r="1.6" fill="#5c3c26" opacity="0.9"/>
  <circle cx="31" cy="13" r="1.4" fill="#5c3c26" opacity="0.9"/>
  <rect x="12" y="21.5" width="10.5" height="7" rx="3" fill="#26262a" stroke="#141416" stroke-width="1.7"/>
  <rect x="25.5" y="21.5" width="10.5" height="7" rx="3" fill="#26262a" stroke="#141416" stroke-width="1.7"/>
  <path d="M 22.5 24 h 3" stroke="#141416" stroke-width="2"/>
  <path d="M 14 24 l 3 1.5 M 27.5 24 l 3 1.5" stroke="#8a8a94" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 20.5 34 Q 24 37 27.5 34" fill="none" stroke="#2d2416" stroke-width="1.8" stroke-linecap="round"/>
