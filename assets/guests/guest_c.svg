<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64">
  <!-- chibi beyefendi: silindir şapka, bıyık, siyah frak (tam boy, kalın çizgi) -->
  <defs>
    <radialGradient id="gc_skin" cx="42%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fce3c2"/>
      <stop offset="100%" stop-color="#f2c9a0"/>
    </radialGradient>
    <linearGradient id="gc_suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a52"/>
      <stop offset="100%" stop-color="#26262a"/>
    </linearGradient>
    <linearGradient id="gc_hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a40"/>
      <stop offset="100%" stop-color="#18181a"/>
    </linearGradient>
  </defs>
  <ellipse cx="24" cy="62" rx="13" ry="2.2" fill="#241608" opacity="0.2"/>
  <!-- kollar -->
  <path d="M 15 41 q -5 2 -6 10 l 0 4" fill="none" stroke="url(#gc_suit)" stroke-width="5.4" stroke-linecap="round"/>
  <path d="M 33 41 q 5 2 6 10 l 0 4" fill="none" stroke="url(#gc_suit)" stroke-width="5.4" stroke-linecap="round"/>
  <circle cx="9" cy="56" r="3" fill="#f2c9a0" stroke="#2d2416" stroke-width="1.8"/>
  <circle cx="39" cy="56" r="3" fill="#f2c9a0" stroke="#2d2416" stroke-width="1.8"/>
  <path d="M 15 41 q -5 2 -6 10 l 0 4" fill="none" stroke="#2d2416" stroke-width="2" stroke-linecap="round"/>
  <path d="M 33 41 q 5 2 6 10 l 0 4" fill="none" stroke="#2d2416" stroke-width="2" stroke-linecap="round"/>
  <!-- ayakkabılar -->
  <path d="M 14 57 h 8 v 5 q 0 2 -2 2 h -6 z" fill="#18181a" stroke="#000000" stroke-width="1.8"/>
  <path d="M 26 57 h 8 v 5 q 0 2 -2 2 h -6 z" fill="#18181a" stroke="#000000" stroke-width="1.8"/>
  <!-- pantolon -->
  <rect x="16.5" y="49" width="6" height="11" rx="2" fill="url(#gc_suit)" stroke="#2d2416" stroke-width="2"/>
  <rect x="25.5" y="49" width="6" height="11" rx="2" fill="url(#gc_suit)" stroke="#2d2416" stroke-width="2"/>
  <!-- frak + yelek -->
  <path d="M 16.5 39 L 31.5 39 L 33.5 57 Q 24 60 14.5 57 Z" fill="url(#gc_suit)" stroke="#2d2416" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M 21.5 39 L 20 47 L 24 53 L 28 47 L 26.5 39 Z" fill="#f5efdc" stroke="#2d2416" stroke-width="1.6"/>
  <path d="M 24 40 L 22.5 46 L 24 51 L 25.5 46 Z" fill="#8db4d9" stroke="#2d2416" stroke-width="1.2"/>
  <path d="M 16.5 40 L 14.5 57 M 31.5 40 L 33.5 57" fill="none" stroke="#101012" stroke-width="1.4" opacity="0.7"/>
  <!-- baş + şapka -->
  <circle cx="24" cy="25" r="15.5" fill="url(#gc_skin)" stroke="#2d2416" stroke-width="2.3"/>
  <path d="M 8 18 C 10 12 38 12 40 18 L 40 20.5 L 8 20.5 Z" fill="url(#gc_hat)" stroke="#000000" stroke-width="2"/>
  <rect x="13" y="0.5" width="22" height="18" rx="2" fill="url(#gc_hat)" stroke="#000000" stroke-width="2"/>
  <rect x="13" y="11.5" width="22" height="4.4" fill="#a83e35"/>
  <path d="M 16 3.5 C 15 7 14.5 11 14.5 14" fill="none" stroke="#5a5a63" stroke-width="1.5" opacity="0.7"/>
  <circle cx="18" cy="26" r="4.6" fill="#ffffff" stroke="#2d2416" stroke-width="1.8"/>
  <circle cx="30" cy="26" r="4.6" fill="#ffffff" stroke="#2d2416" stroke-width="1.8"/>
  <path d="M 22.4 26 h 3.2 M 13.4 25 l -2.8 -1" fill="none" stroke="#2d2416" stroke-width="1.8"/>
  <circle cx="19" cy="26.6" r="1.8" fill="#2e1c0c"/>
  <circle cx="31" cy="26.6" r="1.8" fill="#2e1c0c"/>
  <path d="M 15.5 33.5 Q 19 32.2 22.4 33.5 M 25.6 33.5 Q 29 32.2 32.5 33.5" fill="none" stroke="#f5f0e6" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 19 36.5 q 5 3.2 10 -0.5" fill="none" stroke="#2d2416" stroke-width="1.8" stroke-linecap="round"/>
