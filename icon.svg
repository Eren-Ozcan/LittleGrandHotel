      <stop offset="0%" stop-color="#8fd0f5"/>
      <stop offset="100%" stop-color="#ffe0ea"/>
    </linearGradient>
    <linearGradient id="ic_face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1d6"/>
      <stop offset="100%" stop-color="#fbe6c4"/>
