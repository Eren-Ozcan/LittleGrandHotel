  <path d="M 40 88 C 40 93 48 93 48 88 M 48 88 C 48 93 56 93 56 88 M 56 88 C 56 93 64 93 64 88 M 64 88 C 64 93 72 93 72 88 M 72 88 C 72 93 80 93 80 88 M 80 88 C 80 93 88 93 88 88" fill="#ffd878" stroke="#7a4632" stroke-width="2.6"/>
