    <path d="M 96 48 q -5 9 0 18 l -5 0 q 3 -9 0 -18 Z"/>
  </g>
  <path d="M 54 48 q 5 9 0 18 l 5 0 q -3 -9 0 -18 Z" fill="#8fd0a8"/>
  <path d="M 74 48 q -5 9 0 18 l -5 0 q 3 -9 0 -18 Z" fill="#8fd0a8"/>
  <!-- altın kapı -->
