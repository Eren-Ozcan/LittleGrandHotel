  </defs>
  <rect width="128" height="128" rx="24" fill="url(#ic_sky)"/>
  <ellipse cx="26" cy="26" rx="16" ry="8" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="104" cy="20" rx="13" ry="7" fill="#ffffff" opacity="0.9"/>
  <!-- cephe -->
